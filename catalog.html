<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог и Корзина</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header>
        <h1>Мой уютный уголок</h1>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="item.html">Карманные часы</a></li>
            </ul>
        </nav>
    </header>
    <hr>

    <main class="catalog-container">
        <section class="catalog-section">
            <h2>Каталог товаров</h2>
            
            <div class="filter-box">
                <label for="category-filter">Фильтр по категории: </label>
                <select id="category-filter">
                    <option value="all">Все товары</option>
                    <option value="pocket">Карманные часы</option>
                    <option value="wall">Настенные часы</option>
                </select>
            </div>

            <div id="products-list">
                <div class="product" data-category="pocket" data-price="15000" data-name="Старинные карманные часы" data-id="1">
                    <a href="item.html">
                        <img src="https://images.unsplash.com/photo-1509048191080-d2984bad6ae5?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&h=150&q=80" alt="Старинные часы" width="150" height="150">
                    </a>
                    <br>
                    <a href="item.html">Старинные карманные часы</a>
                    <p class="price">15000 руб.</p>
                    <button class="add-to-cart-btn">Добавить в корзину</button>
                </div>

                <div class="product" data-category="wall" data-price="8500" data-name="Деревянные настенные часы" data-id="2">
                    <img src="https://images.unsplash.com/photo-1563861826100-9cb868fdbe1c?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&h=150&q=80" alt="Настенные часы" width="150" height="150">
                    <br>
                    <span>Деревянные настенные часы</span>
                    <p class="price">8500 руб.</p>
                    <button class="add-to-cart-btn">Добавить в корзину</button>
                </div>

                <div class="product" data-category="pocket" data-price="12000" data-name="Серебряные часы на цепочке" data-id="3">
                    <img src="https://images.unsplash.com/photo-1585123382996-077ae127fc47?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&h=150&q=80" alt="Часы на цепочке" width="150" height="150">
                    <br>
                    <span>Серебряные часы на цепочке</span>
                    <p class="price">12000 руб.</p>
                    <button class="add-to-cart-btn">Добавить в корзину</button>
                </div>
            </div>
        </section>

        <aside class="cart-section">
            <h2>Корзина</h2>
            <ul id="cart-items"></ul>
            <p id="total-price-container">Итого: <span id="cart-total">0</span> руб.</p>
            <button id="clear-cart-btn">Очистить корзину</button>
            <button id="pay-btn">Оплатить</button>
        </aside>
    </main>

    <hr>
    <footer>
        <p>&copy; Все права защищены</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
